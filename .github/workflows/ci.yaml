name: Flowise

on:
    pull_request:
        branches:
            - master

jobs:
    ci:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22]

        steps:
            - uses: actions/checkout@v4
            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22.x"
                  cache: "pnpm"
            - name: Install dependencies
              run: pnpm install
            - name: Fix code
              run: pnpm fix
